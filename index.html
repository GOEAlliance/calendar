<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meeting Calendar</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .day { margin: 18px 0 28px; }
    .day h2 { margin: 0 0 10px; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    th { text-align: left; background: #fafafa; position: sticky; top: 0; }
    a { text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #666; font-size: 13px; }
    .wrap { word-break: break-word; }
    .chip { display:inline-block; padding:2px 8px; border:1px solid #e5e5e5; border-radius:999px; font-size:12px; color:#444; background:#fff; }
    .toolbar { display:flex; gap:10px; align-items:center; margin: 10px 0 18px; flex-wrap:wrap; }
    input { padding:10px 12px; border:1px solid #ddd; border-radius:10px; min-width: 260px; }
    button { padding:10px 12px; border:1px solid #ddd; border-radius:10px; background:#fff; cursor:pointer; }
    button:hover { background:#f7f7f7; }
  </style>
</head>
<body>
  <h1>Meeting Calendar</h1>
  <div class="toolbar">
    <span class="chip">Grouped by day</span>
    <span class="chip">Auto refresh</span>
    <input id="q" placeholder="Tìm: summary / người đặt / link..." />
    <button id="reset">Reset</button>
    <span class="muted" id="status"></span>
  </div>

  <div id="root">Đang tải...</div>

  <script>
    // ====== CONFIG ======
    const API_URL = "https://script.google.com/macros/s/AKfycbxlgVqfWnsS-I4CUVAi2osAruRha-P3zhQoZRJoA6rO8HcJPc4Q3DUhOfZtmgjwQFvDmQ/exec";
    const API_KEY = "fam90u8932"; // đổi nếu backend bạn đổi key
    const REFRESH_MS = 10000;

    const root = document.getElementById("root");
    const statusEl = document.getElementById("status");
    const qEl = document.getElementById("q");
    const resetEl = document.getElementById("reset");

    let itemsAll = [];
    let lastHash = "";

    function pad2(n){ return String(n).padStart(2, "0"); }

    // ====== FIX: Parse CHUẨN DMY (DD/MM/YYYY hh:mm AM|PM) ======
    // Example: 13/03/2026 04:00 PM  => day=13, month=03
    function parseMeetingTime(str) {
      if (!str) return new Date(NaN);
      const s = String(str).trim();

      const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!m) return new Date(s); // fallback (ISO, etc.)

      let [, dd, mm, yyyy, hh, mi, ap] = m;

      const day = parseInt(dd, 10);          // ✅ DD
      const month = parseInt(mm, 10);        // ✅ MM
      const year = parseInt(yyyy, 10);

      let hour = parseInt(hh, 10);
      const minute = parseInt(mi, 10);

      ap = ap.toUpperCase();
      if (ap === "PM" && hour !== 12) hour += 12;
      if (ap === "AM" && hour === 12) hour = 0;

      // month-1 vì JS month 0-based
      return new Date(year, month - 1, day, hour, minute);
    }

    // ====== Format đúng dd/mm/yyyy ======
    function formatDateDDMMYYYY(d){
      return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
    }

    // Output đúng template dd/mm/yyyy hh:mm AM/PM
    function formatMeetingTimeTemplate(d){
      let hour = d.getHours();
      const ap = hour >= 12 ? "PM" : "AM";
      hour = hour % 12;
      if (hour === 0) hour = 12;

      const hh = pad2(hour);
      const mi = pad2(d.getMinutes());
      return `${formatDateDDMMYYYY(d)} ${hh}:${mi} ${ap}`;
    }

    // group key nội bộ
    function dayKey(d){
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function linkCell(url, label) {
      const u = (url || "").trim();
      if (!u) return "";
      const safe = escapeHtml(u);
      return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }

    function groupByDay(items) {
      const parsed = items
        .map(it => {
          const d = parseMeetingTime(it.meetingTime); // ✅ dùng parser DMY
          return { ...it, _date: d, _dayKey: dayKey(d) };
        })
        .filter(it => !isNaN(it._date.getTime()));

      parsed.sort((a,b) => a._date - b._date);

      const map = new Map();
      for (const it of parsed) {
        if (!map.has(it._dayKey)) map.set(it._dayKey, []);
        map.get(it._dayKey).push(it);
      }
      return map;
    }

    function render(items) {
      const groups = groupByDay(items);

      if (!groups || groups.size === 0) {
        root.textContent = "Không có dữ liệu.";
        return;
      }

      root.innerHTML = "";
      for (const [k, dayItems] of groups.entries()) {
        const day = document.createElement("div");
        day.className = "day";

        // tiêu đề theo dd/mm/yyyy
        const h2 = document.createElement("h2");
        h2.textContent = formatDateDDMMYYYY(dayItems[0]._date);
        day.appendChild(h2);

        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th style="width: 22%;">Meeting Time</th>
              <th style="width: 14%;">Ngày</th>
              <th style="width: 24%;">Summary</th>
              <th style="width: 18%;">Người đặt lịch</th>
              <th style="width: 11%;">Meeting Link</th>
              <th style="width: 11%;">Manage Link</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector("tbody");

        for (const it of dayItems) {
          const tr = document.createElement("tr");

          // Hiển thị y chang string từ sheet (nếu có),
          // nhưng nếu string thiếu/khác format thì normalize theo template dd/mm/yyyy hh:mm AM/PM
          const raw = String(it.meetingTime || "").trim();
          const meetingTimeText = raw ? raw : formatMeetingTimeTemplate(it._date);

          tr.innerHTML = `
            <td>${escapeHtml(meetingTimeText)}</td>
            <td>${escapeHtml(formatDateDDMMYYYY(it._date))}</td>
            <td class="wrap">${escapeHtml(it.summary)}</td>
            <td class="wrap">${escapeHtml(it.booker)}</td>
            <td class="wrap">${linkCell(it.meetingLink, "Open")}</td>
            <td class="wrap">${linkCell(it.manageLink, "Manage")}</td>
          `;
          tbody.appendChild(tr);
        }

        day.appendChild(table);
        root.appendChild(day);
      }
    }

    function applyFilter() {
      const q = (qEl.value || "").trim().toLowerCase();
      if (!q) return render(itemsAll);

      const filtered = itemsAll.filter(it => {
        const blob = `${it.summary} ${it.booker} ${it.meetingLink} ${it.manageLink} ${it.meetingTime}`.toLowerCase();
        return blob.includes(q);
      });
      render(filtered);
    }

    qEl.addEventListener("input", applyFilter);
    resetEl.addEventListener("click", () => { qEl.value = ""; render(itemsAll); });

    function hashItems(items) { return JSON.stringify(items); }

    async function fetchItems() {
      const url = `${API_URL}?key=${encodeURIComponent(API_KEY)}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.items || [];
    }

    async function tick() {
      try {
        statusEl.textContent = "Đang cập nhật...";
        const items = await fetchItems();
        const h = hashItems(items);

        if (h !== lastHash) {
          lastHash = h;
          itemsAll = items;
          applyFilter();
          statusEl.textContent = "Đã cập nhật ✓";
        } else {
          statusEl.textContent = "Không đổi";
        }
      } catch (e) {
        statusEl.textContent = "Lỗi";
        root.textContent = "Lỗi tải dữ liệu: " + e.message;
      }
    }

    tick();
    setInterval(tick, REFRESH_MS);
  </script>
</body>
</html>
